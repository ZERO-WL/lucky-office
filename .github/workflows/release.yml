name: Release

# 触发：
#   - push 到 main：由 changesets/action 处理（只开 / 更新 "Version Packages" PR，不再自动发包到 npm）
#   - 手动触发：跑 changeset status，检查当前是否有未消化的 changeset
#
# 设计说明：
#   过去这里集成了 npm publish 步骤（曾尝试 NPM_TOKEN / OIDC Trusted Publisher 两种方案），
#   但在 monorepo + Granular Token + 首次发包 + provenance 的组合下踩了多次 npm registry
#   端"伪装成 404 的权限错误"。出于不再被 CI/CD 鉴权问题阻塞迭代节奏的目的，已经把发包
#   这一步移回本地手动执行：
#     1. CI 仍然帮我们维护 Version PR（自动 bump、自动生成 CHANGELOG、自动 commit）
#     2. Merge Version PR 后，开发者本地执行 pnpm run publish:npm 手动发布
#   想恢复 CI 自动发包时，参考 git log 中 "feat(ci): switch npm publish to OIDC" 那次提交。
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version-pr:
    name: Maintain Version Packages PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write       # 创建 Version PR、commit changelog
      pull-requests: write  # 创建 / 更新 Version PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # changesets 需要完整 history 来生成 changelog

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # 仅维护 Version PR：
      #   - 如果 .changeset/ 下还有未消化的 changeset 文件 → 开 / 更新 "Version Packages" PR
      #   - 如果该 PR 已经合并（即 changeset 文件已被消化）→ 此 step 不做任何事
      #
      # 故意不传 publish 字段：让 changesets/action 跳过 publish 流程
      - name: Create or Update Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
