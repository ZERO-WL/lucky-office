<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Excel 预览（CDN 引用 @lucky-office/js-excel）</title>
    <link rel="stylesheet" href="https://unpkg.com/@lucky-office/js-excel/lib/index.css" />
    <script src="https://unpkg.com/@lucky-office/js-excel/lib/index.umd.js"></script>
</head>
<body>
<div id="excel" style="width: 100vw; height: 100vh"></div>

<script>
    const myExcelPreviewer = jsPreviewExcel.init(document.getElementById('excel'));
    myExcelPreviewer.preview('https://static.shanhuxueyuan.com/test.xlsx').then(() => {
        console.log('预览完成');
    }).catch(e => {
        console.log('预览失败', e);
    });
</script>
</body>
</html>
